name: gaming4free renew (WARP + Python)

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"   # 每小时抽卡一次

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      ####################################################################
      # Install AimiliVPN
      ####################################################################
      - name: Clone AimiliVPN
        run: |
          git clone https://github.com/baoweise-bot/aimili-vpngate.git

      - name: Install AimiliVPN
        run: |
          cd aimili-vpngate

          chmod +x *.sh || true

          sudo bash install.sh

      ####################################################################
      # Status
      ####################################################################
      - name: Show VPN Status
        run: |
          echo "===== ML STATUS ====="
          sudo ml status || true

      ####################################################################
      # Wait bootstrap
      ####################################################################
      - name: Wait VPN Bootstrap
        run: |
          echo "Waiting VPN bootstrap..."
          sleep 60

      ####################################################################
      # Check processes
      ####################################################################
      - name: Check VPN Processes
        run: |
          echo "===== OPENVPN ====="
          ps aux | grep openvpn || true

          echo
          echo "===== PORT 7928 ====="
          sudo ss -lntp | grep 7928 || true

      ####################################################################
      # Wait SOCKS5
      ####################################################################
      - name: Wait For SOCKS5 Ready
        run: |
          for i in {1..30}; do

            echo "Attempt $i"

            IP=$(curl \
              --silent \
              --max-time 20 \
              --socks5-hostname 127.0.0.1:7928 \
              https://api.ipify.org || true)

            if [ -n "$IP" ]; then
              echo "SOCKS5 READY"
              echo "EXIT IP: $IP"
              exit 0
            fi

            sleep 10

          done

          echo "SOCKS5 NOT READY"
          exit 1

      ####################################################################
      # Verify IP
      ####################################################################
      - name: Verify Exit IP
        run: |
          echo "===== DIRECT ====="
          curl -s https://api.ipify.org || true
          echo

          echo
          echo "===== SOCKS5 ====="
          curl \
            --socks5-hostname 127.0.0.1:7928 \
            https://api.ipify.org || true
          echo

          echo
          echo "===== PING0 ====="
          curl \
            --socks5-hostname 127.0.0.1:7928 \
            https://ip.sb || true
          echo

      ####################################################################
      # Verify g4f
      ####################################################################
      - name: Test G4F Via SOCKS5
        run: |
          curl \
            -I \
            --max-time 30 \
            --socks5-hostname 127.0.0.1:7928 \
            https://g4f.gg/deku || true
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python packages
        run: |
          pip install seleniumbase SpeechRecognition pydub
          sbase install chromium

      # =========================
      # 🟡 2️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          MC_USERNAME: ${{ secrets.MC_USERNAME }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          
          echo "🌍 验证 WARP SOCKS5 代理 IP:"
          # 这次绝对能成功连上 40000 端口并打印出 WARP IP
          curl -s -x socks5://127.0.0.1:7928 https://api.ipify.org || echo "⚠️ IP获取失败"
          echo ""
          
          # 启动虚拟桌面并运行无敌的 Python 打码脚本
          xvfb-run -a python renew.py
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/**
          if-no-files-found: warn
